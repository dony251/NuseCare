<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new NurseCare account to find and book professional home nursing services.">
  <title>Create Account – NurseCare</title>
  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lato:wght@300;400;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body id="page-register" style="background:var(--light-bg); display: flex; flex-direction: column; min-height: 100vh;">

  <nav class="navbar navbar-expand-lg bg-white sticky-top border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html" style="text-decoration:none;">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg" class="d-inline-block align-top navbar-logo">
          <path d="M21 2L5 8V18C5 28.1 11.8 37.3 21 40C30.2 37.3 37 28.1 37 18V8L21 2Z" fill="#2563eb" fill-opacity="0.1"/>
          <path d="M21 2L5 8V18C5 28.1 11.8 37.3 21 40C30.2 37.3 37 28.1 37 18V8L21 2Z" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 12.5C24.5 9 29.5 9 32.5 12C35.5 15 35.5 20 32.5 23C29.5 26 21 32 21 32C21 32 12.5 26 9.5 23C6.5 20 6.5 15 9.5 12C12.5 9 17.5 9 21 12.5Z" fill="#14b8a6"/>
          <path d="M21 15V21M18 18H24" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="color:#2563eb; font-family:'Outfit',sans-serif; font-weight:800; font-size:1.6rem; letter-spacing: -0.5px;">Nurse<span style="color:#14b8a6; font-weight: 500;">Care</span></span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">
          <span class="lang-flag" aria-hidden="true">🌐</span>
          <span data-i18n="nav_lang">العربية</span>
        </button>
        <a href="login.html" class="btn btn-outline-primary" data-i18n="nav_login">Log In</a>
        <a href="register.html" class="btn btn-primary" data-i18n="nav_signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="row justify-content-center w-100">
      <div class="col-md-6 col-lg-5">

        <div class="text-center mb-4">
          <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a7fc1,#135d90);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.8rem;" aria-hidden="true">✨</div>
          <h2 style="font-family:'Nunito',sans-serif;font-weight:800;" data-i18n="reg_h2">Create Your Account</h2>
          <p class="text-muted" data-i18n="reg_sub">Join NurseCare and start your journey</p>
        </div>

        <div class="form-card bg-white p-4 shadow-sm" style="border-radius: 16px; border: 1px solid var(--border);">
          <form id="registerForm">
            
            <div class="mb-3">
              <label class="form-label fw-semibold text-muted small" data-i18n="reg_type">Account Type</label>
              <div class="d-flex gap-3">
                <div class="form-check flex-grow-1">
                  <input class="form-check-input" type="radio" name="accountType" id="typePatient" value="patient" checked>
                  <label class="form-check-label fw-bold text-dark" for="typePatient" data-i18n="reg_patient">👤 Patient</label>
                </div>
                <div class="form-check flex-grow-1">
                  <input class="form-check-input" type="radio" name="accountType" id="typeNurse" value="nurse">
                  <label class="form-check-label fw-bold text-dark" for="typeNurse" data-i18n="reg_nurse">👩‍⚕️ Nurse</label>
                </div>
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label for="regFirstName" class="form-label fw-semibold text-muted small" data-i18n="reg_first">First Name</label>
                <input type="text" class="form-control" id="regFirstName" placeholder="John" required>
              </div>
              <div class="col-6">
                <label for="regLastName" class="form-label fw-semibold text-muted small" data-i18n="reg_last">Last Name</label>
                <input type="text" class="form-control" id="regLastName" placeholder="Doe" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="regEmail" class="form-label fw-semibold text-muted small" data-i18n="reg_email">Email Address</label>
              <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
              <label for="regPhone" class="form-label fw-semibold text-muted small" data-i18n="reg_phone">Phone Number</label>
              <input type="tel" class="form-control" id="regPhone" placeholder="01X XXXX XXXX" required>
            </div>

            <div id="nurseExtraFields" style="display: none; background: var(--light-bg); padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 1rem;">
              <h6 class="text-primary small fw-bold mb-3" data-i18n="reg_nurse_details_h">🩺 PROFESSIONAL DETAILS</h6>
              
              <div class="mb-3">
                <label class="form-label small fw-bold text-muted" data-i18n="reg_spec_label">Specialty *</label>
                <select class="form-select" id="regSpecialty">
                  <option value="General Care" data-i18n="spec_general">General Care</option>
                  <option value="Elderly Care" data-i18n="spec_elderly">Elderly Care</option>
                  <option value="Post-Op Care" data-i18n="spec_post_op">Post-Op Care</option>
                  <option value="Pediatric Care" data-i18n="spec_pediatric">Pediatric Care</option>
                  <option value="Chronic Disease" data-i18n="spec_chronic">Chronic Disease</option>
                  <option value="Palliative Care" data-i18n="spec_palliative">Palliative Care</option>
                  <option value="Rehabilitation" data-i18n="spec_rehab">Rehabilitation</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label small fw-bold text-muted" data-i18n="reg_rate_label">Hourly Rate (EGP) *</label>
                <input type="number" class="form-control" id="regHourlyRate" placeholder="e.g. 300" value="300">
              </div>

              <div class="mb-2">
                <label class="form-label small fw-bold text-muted" data-i18n="reg_bio_label">Brief Bio</label>
                <textarea class="form-control" id="regBio" rows="2" data-i18n-placeholder="reg_bio_ph" placeholder="Tell patients about your experience..."></textarea>
              </div>
            </div>

            <div class="mb-3 mt-3">
              <label for="regPassword" class="form-label fw-semibold text-muted small" data-i18n="reg_pw">Password</label>
              <input type="password" class="form-control" id="regPassword" placeholder="Minimum 8 characters" required minlength="8">
            </div>

            <div class="mb-4">
              <label for="regConfirm" class="form-label fw-semibold text-muted small" data-i18n="reg_confirm">Confirm Password</label>
              <input type="password" class="form-control" id="regConfirm" placeholder="********" required minlength="8">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:1.05rem; font-weight:700; border-radius: 8px;" data-i18n="reg_btn">Create Account</button>
          </form>
        </div>

        <p class="text-center mt-4 text-muted small">
          <span data-i18n="reg_have_acc">Already have an account?</span> <a href="login.html" class="fw-bold text-primary text-decoration-none" data-i18n="reg_signin">Sign in</a>
        </p>

      </div>
    </div>
  </div>

  <footer style="margin-top:auto; padding: 20px 0; border-top: 1px solid var(--border); background: white;">
    <div class="container text-center text-muted small">
      © 2026 NurseCare — <a href="index.html" class="text-decoration-none fw-semibold text-primary" data-i18n="nav_home">Go to Home</a>
    </div>
  </footer>

  <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/lang.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 1. إظهار/إخفاء بيانات الممرض
      const typePatient = document.getElementById('typePatient');
      const typeNurse = document.getElementById('typeNurse');
      const nurseFields = document.getElementById('nurseExtraFields');

      function toggleNurseFields() {
        if (typeNurse.checked) {
          nurseFields.style.display = 'block';
        } else {
          nurseFields.style.display = 'none';
        }
      }

      typePatient.addEventListener('change', toggleNurseFields);
      typeNurse.addEventListener('change', toggleNurseFields);

      // 2. معالجة بيانات الفورم وإرسالها
      const form = document.getElementById('registerForm');
      
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault(); 
          
          const pw  = document.getElementById('regPassword').value;
          const cpw = document.getElementById('regConfirm').value;
          const notify = typeof showToast === 'function' ? showToast : alert;

          if (pw !== cpw) { 
            notify((typeof window.t === 'function') ? window.t('reg_pw_error') || 'Passwords do not match!' : 'Passwords do not match!'); 
            return; 
          }
          
          const accountTypeVal = document.querySelector('input[name="accountType"]:checked').value;

          const userData = {
            accountType: accountTypeVal,
            firstName: document.getElementById('regFirstName').value,
            lastName: document.getElementById('regLastName').value,
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value,
            password: pw,
            specialty: accountTypeVal === 'nurse' ? document.getElementById('regSpecialty').value : '',
            hourlyRate: accountTypeVal === 'nurse' ? document.getElementById('regHourlyRate').value : 0,
            bio: accountTypeVal === 'nurse' ? document.getElementById('regBio').value : ''
          };

          fetch('api/register.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
          })
          .then(res => res.json())
          .then(data => {
            if(data.status === 'success') {
              notify('✅ Account created successfully! Redirecting...');
              setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
              notify('❌ Error: ' + data.message); 
            }
          })
          .catch(err => {
            console.error(err);
            notify('❌ Server connection error!');
          });
        });
      }
    });
  </script>
</body>
</html>
